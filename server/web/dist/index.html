  <style>

on:box-shadow .16s ease}.message:hover{box-shadow:0 6px 0 rgba(0,0,0,.08)}.route{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;font-weight:800;opacity:.78;margin-bottom:7px;overflow-wrap:anywhere;word-break:break-word}.route-agent{max-width:100%;border:2px solid var(--text);border-radius:var(--r-pill);background:var(--agent-color);padding:3px 8px;overflow:hidden;text-overflow:ellipsis;transition:transform .14s ease,filter .14s ease}.route-agent:hover{transform:translateY(-1px);filter:saturate(1.08)}.route-arrow{opacity:.6}.message-body{position:relative}.content{font-size:15px;line-height:1.4;overflow-wrap:anywhere;word-break:break-word}.message.collapsed .content{display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}.message.collapsed .message-body:after{content:'';position:absolute;right:0;bottom:0;width:34%;height:1.7em;background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.86) 68%,var(--white));pointer-events:none;z-index:1}.message.expanded .message-body:after{display:none}.content p{margin:0 0 8px}.content p:last-child{margin-bottom:0}.content ul,.content ol{margin:8px 0;padding-left:20px}.content code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:rgba(0,0,0,.08);border-radius:6px;padding:1px 4px}.message-toggle{margin-top:8px;border:0;background:transparent;padding:0;font-weight:800;text-decoration:underline;cursor:pointer;color:var(--text);transition:transform .16s ease,filter .16s ease}.message.collapsed .message-toggle{position:absolute;right:0;bottom:-1px;z-index:2;margin-top:0;border:2px solid var(--text);border-radius:999px;background:linear-gradient(90deg,rgba(255,255,255,.72),var(--white));padding:2px 8px;text-decoration:none;font-size:12px;line-height:1.2;box-shadow:0 0 0 2px var(--white)}.message.expanded .message-toggle{position:static}.message-toggle:hover{transform:translateY(-1px);filter:saturate(1.08)}.message-toggle[hidden]{display:none}.time{margin-top:8px;font-size:11px;font-weight:700;opacity:.55}.load{background:var(--lemon);align-self:center;margin:0 0 4px;width:44px;height:44px;flex:0 0 44px;padding:0;display:grid;place-items:center;font-size:24px;line-height:1}.load:disabled,.settings-load:disabled,.danger:disabled{opacity:.65;cursor:wait}.jump-latest{position:absolute;right:22px;bottom:22px;width:44px;height:44px;border:2px solid var(--text);border-radius:999px;background:var(--pumpkin);font-weight:800;font-size:24px;line-height:1;cursor:pointer;box-shadow:3px 3px 0 var(--text);z-index:4}.jump-latest[hidden]{display:none}.icon-button{display:grid;place-items:center;width:42px;height:42px;margin-top:0;padding:0;text-decoration:none;color:var(--text);background:var(--white);font-size:22px;line-height:1}.settings-link{position:absolute;right:24px;top:20px;z-index:4;background:var(--white)}.status{margin-left:auto;border:2px solid var(--text);border-radius:999px;background:var(--green);width:14px;height:14px}.toast{position:absolute;z-index:6;left:24px;bottom:20px;max-width:calc(100% - 48px);border:2px solid var(--text);background:var(--pumpkin);border-radius:var(--r-pill);padding:10px 16px;font-weight:800;display:none;overflow-wrap:anywhere;word-break:break-word}.settings{height:100vh;display:grid;padding:20px}.settings-shell{display:flex;flex-direction:column;min-width:0;min-height:0;border:2px solid var(--text);background:var(--white);border-radius:8px;overflow:hidden}.settings-top{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:2px solid var(--text);background:var(--sky)}.settings-title{font-family:'Alfa Slab One',serif;font-size:28px;line-height:1}.settings-back{margin:0;background:var(--white)}.settings-body{flex:1;min-height:0;display:grid;grid-template-columns:220px minmax(0,1fr)}.settings-nav{border-right:2px solid var(--text);background:#fbfbf8;padding:14px}.settings-nav button{width:100%;display:flex;align-items:center;gap:10px;border:2px solid var(--text);border-radius:8px;background:var(--white);padding:12px;font-weight:800;text-align:left;cursor:pointer}.settings-nav button.active{background:var(--lemon)}.settings-panel{min-width:0;overflow:auto;padding:20px}.settings-panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.settings-panel h2{margin:0;font-size:21px;line-height:1}.agents-table{width:100%;border-collapse:separate;border-spacing:0;border:2px solid var(--text);border-radius:8px;overflow:hidden;background:var(--white)}.agents-table th,.agents-table td{padding:12px;border-bottom:2px solid var(--text);text-align:left;font-size:14px;vertical-align:middle}.agents-table th{background:#fbfbf8;font-weight:800}.agents-table tr:last-child td{border-bottom:0}.agent-cell{font-weight:800;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.status-dot{display:inline-flex;align-items:center;gap:7px;font-weight:800}.status-dot:before{content:'';width:10px;height:10px;border:2px solid var(--text);border-radius:999px;background:var(--pumpkin)}.status-dot.active:before{background:var(--green)}.danger{margin:0;background:var(--pumpkin);padding:8px 12px}.settings-load{background:var(--lemon);margin-top:14px}.settings-empty{border:2px dashed var(--text);border-radius:8px;padding:22px;font-weight:800;background:#fbfbf8}.settings .toast{position:fixed;left:40px;bottom:28px}@media(max-width:900px){.app{grid-template-columns:1fr;height:auto;min-height:100vh}.stage{height:62vh}.feed{min-height:420px}.settings{height:auto;min-height:100vh}.settings-body{grid-template-columns:1fr}.settings-nav{border-right:0;border-bottom:2px solid var(--text)}.settings-panel{padding:14px;overflow:auto}.agents-table{min-width:720px}}@media(max-width:420px){.stage-head{gap:8px}.brand{font-size:30px}.pill{padding:6px 11px}.settings-link{right:18px}}@media(max-width:360px){.pill{position:absolute;left:0;top:42px}.status{position:absolute;left:76px;top:50px;margin-left:0}}
  </style>
</head>
<body>
  <main class="app" id="home-page">
    <section class="stage"><div class="board"></div><canvas class="smoke" id="smoke" aria-hidden="true"></canvas><canvas class="spark" id="spark" aria-hidden="true"></canvas><svg id="edges"></svg><div class="stage-head"><div class="brand">chanwire</div><div class="pill" id="agent-count">0 online</div><div class="status" id="status"></div></div><a class="icon-button settings-link" id="settings-link" href="/settings" aria-label="open settings">&#9881;</a><div id="agents"></div><div class="empty" id="empty">No online agents yet.<br/>Connect agents over WebSocket to light up the board.</div><div class="toast" id="toast"></div></section>
    <aside class="feed"><div class="feed-head"><div class="feed-title">messages</div></div><div class="messages" id="messages"></div><button class="jump-latest" id="jump-latest" type="button" aria-label="scroll to latest" hidden>&#8595;</button></aside>
  </main>
  <main class="settings" id="settings-page" hidden>
    <section class="settings-shell">
      <header class="settings-top"><a class="icon-button settings-back" id="settings-back" href="/" aria-label="back to board">&#8592;</a><div class="settings-title">settings</div></header>
      <div class="settings-body">
        <nav class="settings-nav"><button class="active" type="button" data-settings-group="agents"><span aria-hidden="true">&#128101;</span><span>Agents</span></button></nav>
        <section class="settings-panel">
          <div class="settings-panel-head"><h2>Agents</h2><button class="settings-load" id="settings-refresh" type="button">Refresh</button></div>
          <div id="settings-agents"></div>
          <button class="settings-load" id="settings-load" type="button" hidden>Load more</button>
        </section>
      </div>
    </section>
    <div class="toast" id="settings-toast"></div>
  </main>
<script>
const colors=['#ace2df','#e69dff','#84bfff','#ef724f','#e7db4c','#6ed311'];
const messagePageSize=20;
const bottomStickThreshold=48;
let state={agents:[],edges:[],messages:[]},selected=null,hasOlderMessages=false,loadingOlderMessages=false;
const settingsPageSize=20;
let settingsAgents=[],settingsOffset=0,settingsNextOffset=null,settingsLoading=false;
let homeNeedsRefresh=false;
const $=id=>document.getElementById(id);
const stage=document.querySelector('.stage');
const expandedMessages=new Set();
const boardPan={x:0,y:0,dragging:false,startX:0,startY:0,originX:0,originY:0};
const smokeAnchors=[
  {rgb:'82,211,255',x:.1,y:.15,r:.26,phase:.2,drift:.025},
  {rgb:'132,169,255',x:.5,y:.12,r:.24,phase:1.1,drift:.022},
  {rgb:'100,236,215',x:.9,y:.18,r:.25,phase:2.2,drift:.024},
  {rgb:'170,145,255',x:.18,y:.48,r:.3,phase:3.4,drift:.026},
  {rgb:'94,198,255',x:.52,y:.48,r:.34,phase:4.1,drift:.03},
  {rgb:'154,245,225',x:.84,y:.5,r:.3,phase:5.2,drift:.026},
  {rgb:'116,226,255',x:.14,y:.86,r:.27,phase:6.1,drift:.023},
  {rgb:'204,188,255',x:.5,y:.86,r:.28,phase:7.3,drift:.025},
  {rgb:'132,218,255',x:.9,y:.84,r:.27,phase:8.4,drift:.023}
];
const smokeBlobs=smokeAnchors.map((a,i)=>({...a,homeX:a.x,homeY:a.y,flow:.65+i*.07}));
const smokeParticles=Array.from({length:220},(_,i)=>{const ring=i%5,angle=i*2.399963;return{base:.08+ring*.045,angle,phase:(i%37)*.17,s:1+(i%4)*.35,speed:.42+(i%9)*.025,rgb:smokeAnchors[i%smokeAnchors.length].rgb}});
const sparkDust=Array.from({length:96},(_,i)=>({x:((i*41)%137)/136,y:((i*67)%149)/148,s:.55+(i%5)*.22,phase:(i%31)*.19,speed:.3+(i%7)*.04,rgb:smokeAnchors[(i*2)%smokeAnchors.length].rgb}));
const smokeGrain=Array.from({length:260},(_,i)=>{const a=.012+(i%7)*.0025;return{x:((i*37)%113)/112,y:((i*53)%127)/126,s:.65+(i%4)*.34,speed:.42+(i%11)*.035,color:`rgba(80,128,176,${a})`}});
const organicPts=Array.from({length:14},()=>({x:0,y:0}));
const smokeMouse={x:0,y:0,lastX:0,lastY:0,windX:0,windY:0,active:false};
let smokeCanvas=null,smokeCtx=null,sparkCanvas=null,sparkCtx=null,smokeTick=0;
function hash(s){let h=0;for(const ch of s)h=(h*31+ch.charCodeAt(0))>>>0;return h}
function color(n){return colors[hash(n)%colors.length]}
function clamp(n,min,max){return Math.min(Math.max(n,min),max)}
function avatarVariant(n){return hash(n)%6}
function agentAvatar(n){const v=avatarVariant(n),hair=[`<path d="M28 42q4-20 20-22 14 1 21 18"/><path d="M32 36q14-12 34-5"/>`,`<path d="M26 42q8-22 30-19 12 2 17 17"/><path d="M32 33q10 8 28 3"/>`,`<path d="M30 38q6-16 22-16 16 0 22 16"/><path d="M36 31q11-9 24 0"/>`,`<path d="M28 44q0-20 20-23 18 2 22 22"/><path d="M31 37q13-2 20-12 6 10 19 12"/>`,`<path d="M29 40q9-18 28-15 11 3 16 16"/><path d="M35 32q7-7 22-6"/>`,`<path d="M30 41q4-17 18-20 19 0 24 21"/><path d="M36 33q18-10 30 4"/>`],eyes=[`<path d="M37 50h7"/><path d="M55 50h7"/>`,`<circle class="avatar-ink" cx="40" cy="50" r="2"/><circle class="avatar-ink" cx="58" cy="50" r="2"/>`,`<path d="M36 49q4-4 8 0"/><path d="M54 49q4-4 8 0"/>`,`<path d="M36 50h8"/><circle class="avatar-ink" cx="58" cy="50" r="2"/>`,`<circle class="avatar-ink" cx="40" cy="49" r="2"/><path d="M54 49q5 4 10 0"/>`,`<path d="M36 51q4 3 8 0"/><path d="M54 51q4 3 8 0"/>`],mouth=[`<path d="M41 64q7 5 14 0"/>`,`<path d="M42 64h13"/>`,`<path d="M42 63q6-4 13 0"/>`,`<path d="M42 63q7 7 15 0"/>`,`<path d="M41 64q7 3 14 0"/>`,`<path d="M43 65h11"/>`],extra=[`<path d="M30 57h-5q-4-1-4-6t4-6h4"/><path d="M67 57h5q4-1 4-6t-4-6h-4"/>`,`<path d="M34 47h12"/><path d="M52 47h12"/><path d="M46 47q3 3 6 0"/>`,`<path d="M27 58q-6-5-2-12"/><path d="M69 58q6-5 2-12"/>`,`<path d="M34 44q14-8 28 0"/>`,`<path d="M33 70q15 9 31 0"/>`,`<path d="M31 46q4-5 10-6"/><path d="M65 46q-4-5-10-6"/>`];return `<svg viewBox="0 0 96 96" aria-hidden="true"><path class="avatar-fill" d="M30 42q1-18 18-20 17 1 18 20v13q0 19-18 22-18-3-18-22Z"/>${hair[v]}${extra[v]}${eyes[v]}<path d="M49 53q-4 5 0 8"/><path d="M43 58q5 3 10 0"/>${mouth[v]}<path d="M35 76q13 8 26 0"/></svg>`}
const mixCache={};function mixRGB(a,b){const k=a+'_'+b;if(mixCache[k])return mixCache[k];const av=a.split(',').map(Number),bv=b.split(',').map(Number);return mixCache[k]=av.map((v,i)=>Math.round((v+bv[i])/2)).join(',')}
function sketchEdgePath(a,b,key,shift=0){const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy)||1,gap=Math.min(74,len/3),ux=dx/len,uy=dy/len,nx=-uy,ny=ux,seed=hash(key),jitter=(seed%7)-3+shift,x1=a.x+ux*gap,y1=a.y+uy*gap,x2=b.x-ux*gap,y2=b.y-uy*gap,sx=x2-x1,sy=y2-y1,m1x=x1+sx*.33+nx*jitter,m1y=y1+sy*.33+ny*jitter,m2x=x1+sx*.66-nx*(jitter*.6),m2y=y1+sy*.66-ny*(jitter*.6);return `M ${x1} ${y1} L ${m1x} ${m1y} L ${m2x} ${m2y} L ${x2} ${y2}`}
function positions(){const w=$('agents').parentElement.clientWidth,h=$('agents').parentElement.clientHeight;const cx=w/2,cy=h/2+18,maxR=Math.max(70,Math.min((w-132)/2,(h-150)/2)),r=clamp(Math.min(w,h)*.33,92,maxR);return Object.fromEntries(state.agents.map((a,i)=>{const ang=-Math.PI/2+i*2*Math.PI/Math.max(1,state.agents.length);return[a.agent_name,{x:cx+Math.cos(ang)*r,y:cy+Math.sin(ang)*r}]}))}
function render(opts={}){
  const pos=positions();
  $('agent-count').textContent=`${state.agents.length} online`;
  $('empty').style.display=state.agents.length?'none':'grid';
  $('agents').innerHTML=state.agents.map(a=>{
    const p=pos[a.agent_name];
    return `<button class="agent" style="left:${p.x}px;top:${p.y}px;--agent-color:${color(a.agent_name)}" data-agent="${esc(a.agent_name)}"><div class="avatar">${agentAvatar(a.agent_name)}</div><span class="name">${esc(a.agent_name)}</span></button>`;
  }).join('');
  document.querySelectorAll('.agent').forEach(b=>{
    b.onclick=ev=>{
      ev.stopPropagation();
      const p=pos[b.dataset.agent];
      openComposer(b.dataset.agent,{x:p.x+boardPan.x,y:p.y+boardPan.y});
    };
  });
  drawEdges(pos,opts);
  renderMessages(opts);
}
function drawEdges(pos,opts={}){const pairs=new Map();for(const e of state.edges){if(!pos[e.from_agent]||!pos[e.to_agent])continue;const key=[e.from_agent,e.to_agent].sort().join('\0');const v=pairs.get(key)||{a:e.from_agent,b:e.to_agent,ab:false,ba:false};if(e.from_agent===v.a)v.ab=true;else v.ba=true;pairs.set(key,v)}$('edges').innerHTML=`<defs><marker id="arrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`+[...pairs.values()].map(p=>{const a=pos[p.a],b=pos[p.b],both=p.ab&&p.ba,d=sketchEdgePath(a,b,p.a+p.b),d2=sketchEdgePath(a,b,p.a+p.b,3),pulse=opts.pulseEdge&&((opts.pulseEdge.from_agent===p.a&&opts.pulseEdge.to_agent===p.b)||(both&&opts.pulseEdge.from_agent===p.b&&opts.pulseEdge.to_agent===p.a)),lineClass=pulse?'edge-pulse':'';return `<g class="${lineClass}"><path class="edge-sketch-shadow" d="${d2}"/><path class="${lineClass} edge-sketch" d="${d}" marker-end="url(#arrow)" ${both?'marker-start="url(#arrow)"':''}/></g>`}).join('')}
function isNearMessagesBottom(){const el=$('messages');return !el||el.scrollHeight-el.scrollTop-el.clientHeight<=bottomStickThreshold}

function renderOlderMessagesControl(){return state.messages.length&&hasOlderMessages?`<button class="load" id="load" type="button" aria-label="load older messages" ${loadingOlderMessages?'disabled aria-busy="true"':''}>&#8593;</button>`:''}

function setupMessageToggles(){

function closeComposer(){selected=null;document.querySelector('.composer')?.remove()}

function openComposer(name,p){

async function loadState(opts={}){const stick=opts.scrollToBottom||isNearMessagesBottom();const r=await fetch('/api/v1/web/state');const data=await r.json();if(opts.preserveMessages&&state.messages.length)data.messages=state.messages;state=data;hasOlderMessages=state.messages.length>=messagePageSize;render({...opts,scrollToBottom:stick})}

function showRoute(){const isSettings=location.pathname==='/settings';$('home-page').hidden=isSettings;$('settings-page').hidden=!isSettings;if(isSettings)loadSettingsAgents({reset:true});else{requestAnimationFrame(()=>render({scrollToBottom:isNearMessagesBottom()}));if(homeNeedsRefresh){homeNeedsRefresh=false;refreshHomeAfterVisible()}}}
function setupSettingsNavigation(){

async function loadSettingsAgents(opts={}){
  if(settingsLoading)return;
  if(opts.reset){settingsAgents=[];settingsOffset=0;settingsNextOffset=null;renderSettingsAgents()}
  settingsLoading=true;
  const load=$('settings-load'),refresh=$('settings-refresh');
  if(load)load.disabled=true;
  if(refresh)refresh.disabled=true;
  try{
    const r=await fetch(`/api/v1/web/settings/agents?limit=${settingsPageSize}&offset=${settingsOffset}`);
    if(!r.ok)throw new Error('settings load failed');
    const data=await r.json();
    settingsAgents=opts.reset?data.agents:[...settingsAgents,...data.agents];
    settingsNextOffset=data.next_offset??null;
    settingsOffset=settingsNextOffset??settingsAgents.length;
    renderSettingsAgents();
  }catch{
    toast('settings load failed');
  }finally{
    settingsLoading=false;
    if(load)load.disabled=false;
    if(refresh)refresh.disabled=false;
  }

function renderSettingsAgents(){

  if(!settingsAgents.length){root.innerHTML='<div class="settings-empty">No agents registered.</div>'}

function formatWhen(ms){return ms?new Date(ms).toLocaleString():'never'}
async function deleteSettingsAgent(name,button){
  if(!name)return;
  if(button)button.disabled=true;
  try{
    const r=await fetch(`/api/v1/web/settings/agents/${encodeURIComponent(name)}`,{method:'DELETE'});
    if(!r.ok)throw new Error('delete failed');
    toast('agent deleted');
    await loadSettingsAgents({reset:true});

  }catch{
    toast('delete failed');
    if(button)button.disabled=false;

stage.addEventListener('click',ev=>{if(!document.querySelector('.composer')?.contains(ev.target))closeComposer()});

function applyBoardPan(){stage.style.setProperty('--pan-x',`${boardPan.x}px`);stage.style.setProperty('--pan-y',`${boardPan.y}px`)}
function setupBoardPan(){
  stage.addEventListener('pointerdown',ev=>{

    ev.preventDefault();

function connect(){const ws=new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}/api/v1/web/ws`);ws.onopen=()=>{$('status').style.background='var(--green)'};ws.onclose=()=>{$('status').style.background='var(--pumpkin)';setTimeout(connect,1200)};ws.onmessage=ev=>{const f=JSON.parse(ev.data);if(f.type==='message'&&f.message)appendRealtimeMessage(f.message);else if(f.type==='presence')loadState({preserveMessages:true})}}
